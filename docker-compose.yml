services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # No shared volume here for source code anymore to prevent stale cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - web-network

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - app
    # No shared volume here for source code anymore
    networks:
      - web-network

networks:
  web-network:
    driver: bridge
